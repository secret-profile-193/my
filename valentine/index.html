<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Valentine's Game</title>
    <meta name="description" content="If it's the heart, I am yours. If it's the stars, you are mine. Flip the coin to see our destiny.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://secret-profile-193.github.io/valentine/">
    <meta property="og:title" content="Valentine's Game">
    <meta property="og:description" content="A special coin flip game. Let's see what destiny has in store for us.">
    <meta property="og:image" content="https://secret-profile-193.github.io/valentine/ogimage.png">
    <meta property="og:image:secure_url" content="https://secret-profile-193.github.io/valentine/ogimage.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://secret-profile-193.github.io/valentine/">
    <meta property="twitter:title" content="Valentine's Game">
    <meta property="twitter:description" content="If it's the heart, I am yours. If it's the stars, you are mine. Flip the coin.">
    <meta property="twitter:image" content="https://secret-profile-193.github.io/valentine/ogimage.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
  <div class="floating-icons" aria-hidden="true">
    <i class="bi bi-heart-fill floating-icon icon-1"></i>
    <i class="bi bi-stars floating-icon icon-2"></i>
    <i class="bi bi-heart-fill floating-icon icon-3"></i>
    <i class="bi bi-stars floating-icon icon-4"></i>
    <i class="bi bi-heart-fill floating-icon icon-5"></i>
    <i class="bi bi-stars floating-icon icon-6"></i>
  </div>

  <div class="container">
    <div class="eyebrow">
      <i class="bi bi-vinyl-fill" aria-hidden="true"></i>
      <span>Romance Roulette</span>
    </div>
    <h1>
      <span>Valentine's Game</span>
    </h1>
    <h2>
      If it's<i class="inline-icon heart-icon bi bi-heart-fill" aria-hidden="true"></i>, I am yours.<br>
      If it's<i class="inline-icon stars-icon bi bi-stars" aria-hidden="true"></i>, you are mine.
    </h2>

    <div class="coin-stage">
      <div class="orbit orbit-a" aria-hidden="true"></div>
      <div class="orbit orbit-b" aria-hidden="true"></div>
      <div class="coin" id="coin">
        <div class="head">
          <i class="bi bi-heart-fill coin-icon" aria-hidden="true"></i>
        </div>
        <div class="tail">
          <i class="bi bi-stars coin-icon" aria-hidden="true"></i>
        </div>
      </div>
      <div class="coin-badge">Love-powered fate machine</div>
    </div>

    <p id="resultText" class="result-text"></p>

    <button class="cta-button" onclick="flipCoin()">
      <i class="bi bi-magic" aria-hidden="true"></i>
      <span>Flip the Coin</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
